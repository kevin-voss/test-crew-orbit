<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SQL lernen – Lern-App für Anfängerinnen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>SQL lernen</h1>
      <p class="tagline">Lern-App für Schülerinnen – erste Schritte ohne Vorkenntnisse</p>
    </header>
    <nav class="app-nav" aria-label="Hauptnavigation">
      <a href="#app">Lernen</a>
    </nav>
    <div id="progress" class="progress-mount" role="status" aria-live="polite"></div>
    <main id="app" aria-live="polite"></main>
    <aside id="path-map" class="path-map-mount" aria-label="Lernpfadübersicht" hidden></aside>
    <footer class="app-footer">
      <p>SQL lernen – kostenlos, ohne Anmeldung, nur auf diesem Gerät.</p>
    </footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
