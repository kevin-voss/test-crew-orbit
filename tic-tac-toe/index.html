<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Tic Tac Toe</h1>
        <p class="tagline">X goes first. Click a square to play.</p>
      </header>

      <main class="main-content" aria-label="Tic tac toe game">
        <p id="status" class="status" role="status" aria-live="polite">
          Current player: X
        </p>

        <div
          class="board"
          id="board"
          role="grid"
          aria-label="3 by 3 game board"
        >
          <button
            type="button"
            class="cell"
            data-index="0"
            aria-label="Cell 1 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="1"
            aria-label="Cell 2 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="2"
            aria-label="Cell 3 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="3"
            aria-label="Cell 4 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="4"
            aria-label="Cell 5 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="5"
            aria-label="Cell 6 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="6"
            aria-label="Cell 7 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="7"
            aria-label="Cell 8 empty"
          ></button>
          <button
            type="button"
            class="cell"
            data-index="8"
            aria-label="Cell 9 empty"
          ></button>
        </div>

        <div class="actions">
          <button type="button" id="reset-btn" class="btn-reset">
            New game
          </button>
        </div>
      </main>
    </div>
  </body>
</html>
