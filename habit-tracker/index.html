<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div
      id="storage-banner"
      class="storage-banner"
      role="alert"
      aria-live="assertive"
      hidden
    ></div>
    <div class="app">
      <header class="hero">
        <h1>Habit Tracker</h1>
        <p class="muted">Daily habits with a simple weekly view.</p>
      </header>

      <nav class="app-nav" aria-label="Primary views">
        <div class="tablist" role="tablist">
          <button
            type="button"
            class="tab"
            id="tab-tracker"
            role="tab"
            aria-selected="true"
            aria-controls="panel-tracker"
          >
            Tracker
          </button>
          <button
            type="button"
            class="tab"
            id="tab-weekly"
            role="tab"
            aria-selected="false"
            aria-controls="panel-weekly"
            tabindex="-1"
          >
            Weekly progress
          </button>
        </div>
      </nav>

      <div id="panel-tracker" class="view-panel" role="tabpanel" aria-labelledby="tab-tracker">
        <section class="card" aria-labelledby="add-heading">
          <h2 id="add-heading">Add a habit</h2>
          <form id="add-form" class="row">
            <label class="grow">
              <span class="sr-only">Habit name</span>
              <input id="habit-name" name="name" type="text" placeholder="Morning stretch…" autocomplete="off" />
            </label>
            <button type="submit">Save</button>
          </form>
          <p id="add-feedback" class="feedback" hidden></p>
        </section>

        <section class="card" aria-labelledby="habits-heading">
          <h2 id="habits-heading">Your habits</h2>
          <p class="muted small">
            <span class="delete-pattern-note">Remove deletes immediately (no extra confirmation).</span>
          </p>
          <div id="habits-list" class="habits-list" role="list"></div>
        </section>

        <section class="card" aria-labelledby="today-heading">
          <h2 id="today-heading">Mark complete</h2>
          <p class="muted">
            Toggle today or earlier days this week (Monday–Sunday, your local time zone).
          </p>
          <div id="today-body"></div>
        </section>
      </div>

      <div id="panel-weekly" class="view-panel" role="tabpanel" aria-labelledby="tab-weekly" hidden>
        <section class="card" aria-labelledby="weekly-heading">
          <h2 id="weekly-heading">Weekly progress</h2>
          <p class="muted small week-intro">Current review week (Monday–Sunday, local dates).</p>
          <div id="week-range" class="week-range"></div>
          <div id="weekly-body" class="weekly-body"></div>
        </section>
      </div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
